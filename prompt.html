<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RNDR 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=fallback" rel="stylesheet">
  <!-- Firebase SDK -->
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAhlGGQhP_aUlGMSwIx-XeezD5fciiOTBw",
      authDomain: "rndr-5a6fe.firebaseapp.com",
      projectId: "rndr-5a6fe",
      storageBucket: "rndr-5a6fe.firebasestorage.app",
      messagingSenderId: "193356121917",
      appId: "1:193356121917:web:f20928b4c587092d73a754",
      measurementId: "G-0Y412W8LBN"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Make Firebase available globally
    window.firebaseDB = db;
    window.firebaseAuth = auth;
    window.onAuthStateChanged = onAuthStateChanged;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;

    // Now include the main script code
    const toast = document.getElementById('toast');

    // Show toast message (reusable)
    function showToast(message = '✨ Prompt copied to clipboard') {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // Copy handler — robust: find the <p> inside the same .flip-card-back
    function handleCopyClick(ev) {
      const button = ev.currentTarget;
      // navigate up to .flip-card-back, then find the paragraph
      const backSide = button.closest('.flip-card-back');
      if (!backSide) return;

      const promptPara = backSide.querySelector('p');
      if (!promptPara) return;

      const promptText = promptPara.textContent.trim();
      if (!promptText) return;

      navigator.clipboard.writeText(promptText)
        .then(() => {
          showToast();
        })
        .catch(() => {
           alert('Press Ctrl+C to copy:\n\n' + promptText);
        });
    }

    // Delete handler
    async function handleDeleteClick(ev) {
      const button = ev.currentTarget;
      const cardDiv = button.closest('.flip-card');
      if (!cardDiv) return;

      const docId = cardDiv.dataset.id;
      if (!docId) return;

      if (!confirm('Are you sure you want to delete this card?')) return;

      try {
        await deleteDoc(doc(window.firebaseDB, 'cards', docId));
        cardDiv.remove();
        showToast('Card deleted successfully!');
      } catch (error) {
        console.error('Error deleting card:', error);
        showToast('Error deleting card. Try again.');
      }
    }

    function attachCopyListeners() {
      document.querySelectorAll('.btn-copy-card').forEach(btn => {
    btn.removeEventListener('click', handleCopyClick);
        btn.addEventListener('click', handleCopyClick);
      });
    }
    attachCopyListeners();

    function attachDeleteListeners() {
      document.querySelectorAll('.btn-delete-card').forEach(btn => {
        btn.removeEventListener('click', handleDeleteClick);
        btn.addEventListener('click', handleDeleteClick);
      });
    }

    // Load saved cards from Firestore
    async function loadSavedCards() {
      try {
        const q = query(collection(window.firebaseDB, 'cards'), orderBy('timestamp', 'desc'));
        const querySnapshot = await getDocs(q);
        const gallery = document.getElementById('gallery');
        querySnapshot.forEach((doc) => {
          const card = doc.data();
          const cardDiv = createCardElement(card.image, card.prompt, doc.id);
          gallery.appendChild(cardDiv);
        });
        attachCopyListeners();
        attachDeleteListeners();
      } catch (error) {
        console.error('Error loading cards:', error);
      }
    }

    // Create card element
    function createCardElement(imageSrc, promptText, docId = null) {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'flip-card';
      if (docId) cardDiv.dataset.id = docId;
      cardDiv.innerHTML = `
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="${imageSrc}" alt="User uploaded card" loading="lazy">
          </div>
          <div class="flip-card-back">
            <p>${promptText}</p>
            <div class="card-buttons">
              <button class="btn-copy-card">Copy Prompt</button>
              <button class="btn-delete-card" style="display: none;">Delete</button>
            </div>
          </div>
        </div>
      `;
      return cardDiv;
    }

    // Open modal
    window.openModal = function() {
      document.getElementById('addCardModal').classList.add('show');
    };

    // Close modal
    window.closeModal = function() {
      document.getElementById('addCardModal').classList.remove('show');
      document.getElementById('cardImage').value = '';
      document.getElementById('cardPrompt').value = '';
    };

    // Add new card
    async function addNewCard() {
      const user = window.firebaseAuth.currentUser;
      if (!user) {
        showToast('You must be signed in to add cards.');
        return;
      }

      const image = document.getElementById('cardImage').value.trim();
      const prompt = document.getElementById('cardPrompt').value.trim();
      if (!image || !prompt) return;

      try {
        // Save to Firestore
        const docRef = await addDoc(collection(window.firebaseDB, 'cards'), {
          image: image,
          prompt: prompt,
          timestamp: new Date(),
          userId: user.uid
        });

        // Add to gallery immediately
        const cardDiv = createCardElement(image, prompt, docRef.id);
        document.getElementById('gallery').appendChild(cardDiv);
        attachCopyListeners();
        attachDeleteListeners();

        // Show delete button since user is signed in
        const deleteBtn = cardDiv.querySelector('.btn-delete-card');
        if (deleteBtn) deleteBtn.style.display = 'inline-flex';

        closeModal();
        showToast('Card added successfully!');
      } catch (error) {
        console.error('Error adding card:', error);
        showToast('Error adding card. Try again.');
      }
    }
    window.addNewCard = addNewCard;

    // Auth state listener
    window.onAuthStateChanged(window.firebaseAuth, (user) => {
      const addCardBtn = document.getElementById('addCardBtn');
      const signInBtn = document.getElementById('signInBtn');
      const signOutBtn = document.getElementById('signOutBtn');
      const deleteButtons = document.querySelectorAll('.btn-delete-card');
      
      if (user) {
        // User is signed in
        addCardBtn.style.display = 'inline-flex';
        signInBtn.style.display = 'none';
        signOutBtn.style.display = 'inline-flex';
        deleteButtons.forEach(btn => btn.style.display = 'inline-flex');
      } else {
        // User is signed out
        addCardBtn.style.display = 'none';
        signInBtn.style.display = 'inline-flex';
        signOutBtn.style.display = 'none';
        deleteButtons.forEach(btn => btn.style.display = 'none');
      }
    });

    // Open sign in modal
    window.openSignInModal = function() {
      document.getElementById('signInModal').classList.add('show');
    };

    // Close sign in modal
    window.closeSignInModal = function() {
      document.getElementById('signInModal').classList.remove('show');
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
    };

    // Sign in user
    async function signInUser() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!email || !password) return;
      
      try {
        await window.signInWithEmailAndPassword(window.firebaseAuth, email, password);
        closeSignInModal();
        showToast('Signed in successfully!');
      } catch (error) {
        console.error('Sign in error:', error);
        showToast('Sign in failed: ' + error.message);
      }
    }

    // Sign out user
    async function signOutUser() {
      try {
        await window.signOut(window.firebaseAuth);
        showToast('Signed out successfully!');
      } catch (error) {
        console.error('Sign out error:', error);
      }
    }

    // Load cards on page load
    loadSavedCards();

    // Attach UI handlers
    document.getElementById('signInBtn').addEventListener('click', openSignInModal);
    document.getElementById('signOutBtn').addEventListener('click', signOutUser);
    document.getElementById('addCardBtn').addEventListener('click', openModal);

    // Modal buttons
    document.getElementById('signInSubmit').addEventListener('click', signInUser);
    document.getElementById('signInCancel').addEventListener('click', closeSignInModal);
  </script>
  <script>
    // Ensure login modal functions exist even if the module fails to load
    window.openSignInModal = window.openSignInModal || function() {
      document.getElementById('signInModal')?.classList.add('show');
    };
    window.closeSignInModal = window.closeSignInModal || function() {
      const modal = document.getElementById('signInModal');
      if (modal) modal.classList.remove('show');
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      if (email) email.value = '';
      if (password) password.value = '';
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --accent: #ff4d00;
      --accent2: #ffaa00;
      --border: #2a2a2a;
      --surface: #1c1c1c;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg) url('img/background.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
    }

     nav {
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,10,0.94); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; height:52px;
  }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:#fff; display:flex; align-items:center; gap:8px; }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-buttons {
    display: flex;
    align-items: center;
    gap: 8px;
  }

    .btn-glass {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 6px 16px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-glass:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.28);
    }
    .btn-glass svg { width:13px; height:13px; }

    .header {
      text-align: center;
      padding: 24px 20px 8px;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(30px, 5vw, 50px);
      margin: 0;
      font-weight: 400;
      line-height: 1.1;
    }
    .header p {
      color: #888;
      margin-top: 8px;
      font-size: 15px;
    }

    /* gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 16px 100px;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 16px 12px 100px;
      }
    }

    /* flip card */
    .flip-card {
      width: 100%;
      position: relative;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      padding-top: 100%; /* 1:1 aspect */
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front, .flip-card-back {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--border);
      backface-visibility: hidden;
      background: #141414;
    }

    .flip-card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .flip-card-back {
      background: #1c1c1c;
      transform: rotateY(180deg);
      padding: 16px 12px;
      gap: 12px;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      overflow-y: auto;
    }

    .flip-card-back p {
      margin: 0;
      max-width: 100%;
    }

    .card-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-copy-card {
      padding: 8px 18px;
      border: none;
      border-radius: 40px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(255, 77, 0, 0.2);
      width: fit-content;
    }
    .btn-delete-card {
      padding: 8px 18px;
      border: none;
      border-radius: 40px;
      background: #dc3545;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
      width: fit-content;
    }
    .btn-delete-card:hover {
      background: #c82333;
    }
    .add-card-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 40px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(255, 77, 0, 0.2);
      margin: 10px auto;
      display: block;
    }
    .add-card-btn:hover {
      background: var(--accent2);
      transform: scale(1.02);
    }

    .add-card-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .add-card-modal.show { display: flex; }
    .add-card-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      width: 90%;
    }
    .add-card-form input, .add-card-form textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }
    .add-card-form button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      margin-right: 10px;
    }
    .add-card-form button:hover { background: var(--accent2); }

    /* toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 10px 24px;
      border-radius: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9999;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }

    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 10, 0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      padding: 12px 24px;
      font-size: 13px;
      color: #666;
      z-index: 90;
    }
@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .footer-bar { padding: 10px 16px; font-size: 12px; }
  .flip-card-back { padding: 12px 8px; font-size: 14px; }
}
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">RNDR 🔥</div>
    <button class="btn-glass" onclick="window.history.back()">← Back</button>
  </div>
  <div class="nav-buttons">
    <button class="btn-glass" id="addCardBtn" style="display: none;">+ Add Card</button>
    <button class="btn-glass" id="signInBtn">Sign In</button>
    <button class="btn-glass" id="signOutBtn" style="display: none;">Sign Out</button>
  </div>
</nav>

<div class="header">
  <h1>RNDR 🔥 Prompts</h1>
  </div>

<div class="gallery" id="gallery">
  
<!-- Add Card Modal -->
<div class="add-card-modal" id="addCardModal">
  <div class="add-card-form">
    <h3>Add New Card</h3>
    <input type="url" id="cardImage" placeholder="Image URL" required>
    <textarea id="cardPrompt" placeholder="Prompt Text" rows="3" required></textarea>
    <button onclick="addNewCard()">Add Card</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Sign In Modal -->
<div class="add-card-modal" id="signInModal">
  <div class="add-card-form">
    <h3>Admin Sign In</h3>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="signInSubmit">Sign In</button>
    <button id="signInCancel">Cancel</button>
  </div>
</div>

<!-- toast for copy feedback -->
<div class="toast" id="toast">✨ Prompt copied to clipboard</div>

<!-- simple footer -->
<div class="footer-bar">© 2026 RNDR — prompt library</div>


</body>
</html>
